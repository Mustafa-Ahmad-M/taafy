<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#16130f" />
<title>مِشوار — رحلة تعافي، خطوة كل يوم</title>
<style>
  :root{
    --bg:#16130f; --raised:#211c16; --soft:#2a241c; --softer:#332b21;
    --gold:#c9a24e; --gold-soft:#e2c88c; --gold-dim:rgba(201,162,78,.16);
    --growth:#86ab6c; --growth-dim:rgba(134,171,108,.15);
    --text:#efe7d9; --muted:#a99a82; --faint:#6f6455;
    --line:rgba(201,162,78,.13); --line-soft:rgba(239,231,217,.07);
    --danger:#c98a6a; --r:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text);
    font-family:"Tajawal","Segoe UI",system-ui,-apple-system,sans-serif;
    line-height:1.7; -webkit-font-smoothing:antialiased; padding-bottom:88px;
    background-image:radial-gradient(120% 80% at 80% -10%, rgba(201,162,78,.06), transparent 60%);
  }
  h1,h2,h3,.kufi{font-family:"Reem Kufi","Tajawal",sans-serif;font-weight:700;letter-spacing:.2px}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  .wrap{max-width:520px;margin:0 auto;padding:22px 18px 10px}
  .fade{animation:fade .4s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.fade{animation:none}*{transition:none!important}}
  .topbar{display:flex;align-items:center;gap:12px;margin-bottom:18px}
  .brand{font-size:1.5rem;color:var(--gold-soft);font-family:"Reem Kufi","Tajawal",sans-serif;font-weight:700}
  .brand small{display:block;font-size:.66rem;color:var(--muted);letter-spacing:1px;font-weight:500;margin-top:-2px}
  .daychip{margin-inline-start:auto;background:var(--gold-dim);color:var(--gold-soft);
    border:1px solid var(--line);border-radius:999px;padding:6px 13px;font-size:.78rem;font-weight:700}
  .card{background:var(--raised);border:1px solid var(--line-soft);border-radius:var(--r);padding:18px;margin-bottom:14px}
  .card.glow{border-color:var(--line);box-shadow:0 0 0 1px var(--gold-dim),0 18px 40px -28px rgba(201,162,78,.5)}
  .eyebrow{font-size:.72rem;letter-spacing:2px;color:var(--gold);font-weight:700;margin-bottom:6px}
  .muted{color:var(--muted)} .faint{color:var(--faint)}
  .quote{font-family:"Reem Kufi","Tajawal",sans-serif;font-size:1.12rem;line-height:1.85;color:var(--gold-soft)}
  .quote .mark{color:var(--gold);opacity:.5;font-size:1.6rem;vertical-align:-6px}
  .ringrow{display:flex;align-items:center;gap:18px}
  .ring{position:relative;width:88px;height:88px;flex:0 0 auto}
  .ring svg{transform:rotate(-90deg)}
  .ring .pct{position:absolute;inset:0;display:grid;place-items:center;font-family:"Reem Kufi","Tajawal",sans-serif;font-size:1.25rem;color:var(--gold-soft)}
  .ringrow .meta h3{margin:0 0 3px;font-size:1.05rem} .ringrow .meta p{margin:0;font-size:.85rem}
  .trail{position:relative;padding:6px 0}
  .camp{display:flex;gap:12px;align-items:flex-start;position:relative;padding-bottom:16px}
  .camp:last-child{padding-bottom:0}
  .camp .rail{position:absolute;inset-inline-start:15px;top:24px;bottom:-4px;width:2px;background:var(--line-soft)}
  .camp:last-child .rail{display:none}
  .camp .dot{width:32px;height:32px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;
    font-family:"Reem Kufi","Tajawal",sans-serif;font-size:.85rem;border:2px solid var(--faint);color:var(--faint);background:var(--bg);z-index:1}
  .camp.done .dot{border-color:var(--growth);color:var(--growth);background:var(--growth-dim)}
  .camp.active .dot{border-color:var(--gold);color:var(--gold-soft);background:var(--gold-dim);box-shadow:0 0 0 5px var(--gold-dim)}
  .camp .ci h4{margin:2px 0 2px;font-size:.98rem} .camp.active .ci h4{color:var(--gold-soft)}
  .camp .ci p{margin:0;font-size:.8rem;color:var(--muted)} .camp .ci .wk{font-size:.7rem;color:var(--faint);font-weight:700}
  .task{background:var(--soft);border:1px solid var(--line-soft);border-radius:14px;margin-bottom:10px;overflow:hidden}
  .task .head{display:flex;align-items:center;gap:13px;padding:14px}
  .checkbox{width:26px;height:26px;border-radius:8px;border:2px solid var(--faint);flex:0 0 auto;display:grid;place-items:center;transition:.2s;font-size:.9rem}
  .checkbox.on{border-color:var(--growth);background:var(--growth);color:#16130f}
  .task .tt{flex:1;min-width:0} .task .tt .name{font-weight:700;font-size:.98rem}
  .task.checked .tt .name{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--faint)}
  .task .tt .dur{font-size:.74rem;color:var(--gold);font-weight:700}
  .task .expand{color:var(--faint);font-size:1.05rem;padding:4px 8px}
  .task .body{padding:0 14px 14px;border-top:1px solid var(--line-soft)}
  .task .body h5{margin:12px 0 4px;font-size:.76rem;letter-spacing:1px;color:var(--gold);font-weight:700}
  .task .body ol,.task .body ul{margin:0;padding-inline-start:20px}
  .task .body li{font-size:.88rem;margin-bottom:4px}
  .task .body .why{font-size:.85rem;color:var(--muted);background:var(--bg);border-radius:10px;padding:10px 12px}
  .ms{border:1px dashed var(--line);border-radius:14px;padding:14px;margin-bottom:10px;background:linear-gradient(180deg,var(--soft),transparent)}
  .ms .r1{display:flex;align-items:center;gap:10px}
  .ms .tag{font-size:.64rem;letter-spacing:1px;font-weight:700;padding:3px 8px;border-radius:6px}
  .ms .tag.write{background:var(--gold-dim);color:var(--gold-soft)} .ms .tag.act{background:var(--growth-dim);color:var(--growth)}
  .ms h4{margin:8px 0 4px;font-size:1rem} .ms p{margin:0 0 6px;font-size:.85rem;color:var(--muted)}
  .ms details summary{color:var(--gold);font-size:.82rem;cursor:pointer;font-weight:700}
  .ms details ol{padding-inline-start:20px;margin:8px 0 0} .ms details li{font-size:.86rem;margin-bottom:4px}
  .btn{display:block;width:100%;text-align:center;background:var(--gold);color:#1b1509;font-weight:800;font-size:1rem;border-radius:14px;padding:15px;margin-top:6px;box-shadow:0 12px 30px -14px rgba(201,162,78,.6)}
  .btn:active{transform:translateY(1px)}
  .btn.ghost{background:transparent;color:var(--gold-soft);border:1px solid var(--line);box-shadow:none}
  .btn.soft{background:var(--soft);color:var(--text);box-shadow:none;border:1px solid var(--line-soft);font-weight:700}
  .nav{position:fixed;bottom:0;inset-inline:0;background:rgba(22,19,15,.94);backdrop-filter:blur(14px);border-top:1px solid var(--line-soft);display:flex;justify-content:space-around;padding:9px 6px calc(9px + env(safe-area-inset-bottom));z-index:20}
  .nav button{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--faint);font-size:.66rem;font-weight:700;padding:4px 10px;border-radius:12px;flex:1}
  .nav button.on{color:var(--gold-soft)} .nav .ic{font-size:1.15rem;line-height:1}
  input,textarea,select{width:100%;background:var(--bg);border:1px solid var(--line-soft);color:var(--text);border-radius:12px;padding:12px;font-family:inherit;font-size:.95rem;resize:vertical}
  input:focus,textarea:focus{outline:none;border-color:var(--line)}
  label.fl{display:block;font-size:.8rem;color:var(--muted);margin:12px 0 5px;font-weight:700}
  .entry{background:var(--soft);border-radius:12px;padding:12px;margin-bottom:8px;font-size:.88rem}
  .entry .d{font-size:.7rem;color:var(--faint);font-weight:700;margin-bottom:4px}
  .bars{display:flex;align-items:flex-end;gap:8px;height:120px;padding-top:8px}
  .bars .b{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;justify-content:flex-end;height:100%}
  .bars .b .col{width:100%;background:linear-gradient(180deg,var(--gold),var(--gold-dim));border-radius:6px 6px 0 0;min-height:3px}
  .bars .b .lb{font-size:.62rem;color:var(--faint);font-weight:700}
  .slider{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .slider input[type=range]{accent-color:var(--gold);flex:1}
  .slider .v{font-family:"Reem Kufi","Tajawal",sans-serif;color:var(--gold-soft);min-width:26px;text-align:center}
  .mapitem{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;background:var(--soft);border-radius:12px;padding:11px;margin-bottom:8px}
  .mapitem .now{font-size:.83rem;font-weight:700} .mapitem .arw{color:var(--gold);font-size:1.1rem} .mapitem .org{font-size:.8rem;color:var(--muted)}
  .safe{border:1px solid var(--danger);background:rgba(201,138,106,.07)} .safe .eyebrow{color:var(--danger)}
  hr.d{border:none;border-top:1px solid var(--line-soft);margin:14px 0}
</style>
</head>
<body>
<div id="app"></div>
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@500;600;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
<script>
"use strict";
/* ================= DATA ================= */
var T = {
  scan:{name:"مسح الجسم",dur:"٥–٧ دقايق",why:"ده مش تمرين استرخاء، ده تدريب على إنك تفضل متصل بجسمك وانت حاسس بانزعاج. القناة اللي بينك وبين إحساسك اتقفلت زمان كحماية — إنت بتعيد فتحها.",how:["اقعد مرتاح وقفّل عينيك، خد ٣ أنفاس بطيئة.","امسح جسمك من الرأس للرجلين، وعند كل منطقة اسأل: في إحساس هنا؟ شد؟ سخونة؟ تقل؟","سمّي الإحساس الخام من غير ما تفسّره — «شد في كتافي»، مش «أنا متوتر».","لو لقيت منطقة فيها انزعاج، خليك معاها ٣ أنفاس ولاحظ إنها مش بتقتلك — دي أهم لحظة."]},
  breath:{name:"التنفس المهدّي",dur:"٣–٥ دقايق",why:"الزفير الأطول من الشهيق بيفعّل نظام التهدئة في جسمك — النظام اللي ما اتبناش كفاية في طفولتك. بتبنيه دلوقتي بالتكرار.",how:["شهيق من الأنف ٤ ثواني.","زفير من البق ٦ ثواني، ببطء.","كرّر ١٠ مرات، وحطّ إيدك على صدرك وانت بتعمله."]},
  label:{name:"تسمية الانفعال",dur:"خلال اليوم",why:"مجرد إنك تسمّي اللي حاسه بكلمة بيقلل شدته فعلياً (مثبت بتصوير الدماغ). التسمية بتنقل النشاط من دوائر الإنذار لدوائر الوعي.",how:["٣ مرات في اليوم على الأقل، قِف ثانية واسأل: أنا حاسس بإيه دلوقتي؟","سمّيه بدقة: خزي؟ غضب؟ قلق؟ وحدة؟","مش لازم تعمل حاجة تجاهه — بس سمّيه."]},
  observe:{name:"ملاحظة موقف (سجل)",dur:"دقيقتين مساءً",why:"قبل ما تحل أي حاجة، لازم تعرف امتى ومع مين الحارس بيشتغل. الملاحظة نفسها بداية التغيير.",how:["آخر اليوم، افتكر موقف حسيت فيه بالجرح أو التوتر.","اكتبه في «الأدوات ← سجل الملاحظة»: إيه اللي حصل؟ جسمك حسّ بإيه؟","اسأل: الجزء اللي حسّ ده عمره كام سنة؟"]},
  mini:{name:"ميني-مسح قبل موقف",dur:"١٥ ثانية",why:"بيخليك تدخل الموقف متصل بجسمك مش مجرّف — فنظام التفكير والقوة بتاعك ما يتقفلش.",how:["قبل أي موقف بتتوتر منه: نفس بطيء واحد.","اسأل نفسك: حاسس بإيه في جسمي دلوقتي؟","ادخل الموقف وانت واخد بالك من جسمك."]},
  touch:{name:"لمسة التهدئة",dur:"عند الحاجة",why:"إيد على الصدر مع نفس بطيء بتفعّل استجابة تهدئة فسيولوجية حقيقية — نفس اللي بيهدّي طفل.",how:["وقت الخزي أو الضيق الحاد، حطّ إيدك على صدرك.","نفس بطيء، وقول لنفسك كلمة رحيمة: «اللحظة دي صعبة، وأنا موجود مع نفسي»."]},
  image:{name:"الصورة الرحيمة",dur:"٥ دقايق",why:"بتبني علاقة داخلية آمنة — البديل عن العين الخارجية اللي بتدوّر عليها في المدح والرياكتات.",how:["اقعد مرتاح، وتخيّل شخصية (حقيقية أو متخيلة) حكيمة، قوية، ودافئة معاك.","تخيّلها بتبصلك بقبول كامل، من غير شرط ومن غير حكم.","خليك في الإحساس ده دقيقة. كرّرها يومياً لحد ما تقدر تستحضرها بسهولة."]},
  critic:{name:"إعادة صياغة الناقد",dur:"عند الحاجة",why:"الناقد الداخلي صوته صوت «يا خايب». مش هتشيله بالقوة، بتوازيه بصوت تاني.",how:["لما تلاحظ الناقد بيقول حاجة قاسية، اكتبها.","ردّ عليها بنفس الحقيقة بس بنبرة اللي هتكلم بيها صاحب حبيب: «غلطت، ده بيحصل، وأنا لسه كفاية»."]},
  attention:{name:"تحويل الانتباه للخارج",dur:"خلال اليوم",why:"القلق الاجتماعي بيتغذّى من إنك بتراقب نفسك من جوه. لما تحوّل انتباهك للموقف، بيقل تلقائياً.",how:["في محادثة، بدل ما تراقب «شكلي إيه؟»، ركّز في تفاصيل خارجية: كلامه، صوته، اللي حواليك.","ابدأ في مواقف سهلة وانقلها للأصعب بالتدريج."]},
  eye:{name:"عيني على فكرتي",dur:"خلال اليوم",why:"المراقبة (هو زعلان؟ عجبه؟) هي اللي بتسحبك وتلجلجك. التركيز على الفكرة بيكسر الحلقة.",how:["وانت بتتكلم، حطّ كل تركيزك على إنك تخلّص فكرتك كاملة.","سيب ملامح اللي قدامك — مش شغلتك دلوقتي."]},
  smilewatch:{name:"رصد الابتسامة الإجبارية",dur:"ملاحظة فقط",why:"قبل ما تغيّر المنعكس، لازم تمسكه. الأسبوع ده ملاحظة بس، من غير أي ضغط تتحكم.",how:["لاحظ: امتى الابتسامة بتقتحم غصب عنك؟ بداية الجملة الجدية؟ لما الطرف يبص؟","سجّلها في «الأدوات ← رصد الابتسامة». مش مطلوب منك تمنعها دلوقتي."]},
  smileflip:{name:"عكس عادة الابتسامة",dur:"في مواقف آمنة",why:"المنعكس سريع، فبنكسره بالبطء. ده تدريب «عكس العادة» المعروف علمياً.",how:["قبل الجملة الجدية: زفير بطيء + إرخاء عضلات وشّك عمداً.","قول أول ٣ كلمات بإيقاع أبطأ من الطبيعي — البطء بيكسر المنعكس.","اتدرّب في مواقف آمنة الأول (لوحدك بصوت عالي، مع مقرب) قبل الحقيقية."]},
  expect:{name:"بطاقة التوقع",dur:"قبل وبعد الموقف",why:"ده سر اللي «سنين مع المدير من غير دليل». التعلّم بيحصل من كسر توقع واعي مكتوب، مش من مجرد إن الموقف عدّى.",how:["قبل الموقف اكتب في «الأدوات ← بطاقات التوقع»: أتوقع [كارثة محددة] بنسبة [٪].","بعده اكتب: اللي حصل فعلاً إيه؟","قارن الفجوة — دي اللي بتتسجّل كدليل جديد."]},
  review:{name:"المراجعة الذهنية بعد الموقف",dur:"دقيقتين",why:"الخطوة دي بتثبّت التعلّم الجديد في الذاكرة. من غيرها التعرّض بيضيع.",how:["بعد أي موقف تعرّض، اقعد دقيقتين.","اسأل: إيه اللي اتعلمته النهاردة عن توقعاتي؟ الكارثة اللي خفت منها حصلت؟"]},
  timeupdate:{name:"جملة التحديث الزمني",dur:"قبل المواقف المُشغِّلة",why:"الأعراض دي غالباً مشاهد قديمة بتتعاد. الجملة دي بتحدّث الذاكرة إن الزمن اتغيّر.",how:["قبل أي موقف بيشغّل مشهد قديم (زي المشي مع أمك)، قول لنفسك:","«الجزء اللي خايف ده عنده ٨ سنين. أنا عندي عمري الحقيقي، وعندي قدرات ماكانتش موجودة وقتها.»"]},
  dropsafety:{name:"إسقاط سلوك أمان",dur:"أثناء التعرّض",why:"التعرّض وانت بتستلطف أو بتحضّر زيادة = تعرّض ملغي المفعول، لأن عقلك بينسب النجاة للسلوك مش لنفسك.",how:["اختار سلوك أمان واحد (ابتسامة استرضاء، تحضير زائد، هزار).","ادخل الموقف من غيره مرة واحدة، ولاحظ إنك عشت من غيره."]},
  value:{name:"فعل بدافع القيمة",dur:"مرة في اليوم",why:"لما تعمل حاجة مهمة ليك إنت، محدش هيشوفها، بتبني مقياس داخلي بدل الخارجي.",how:["اعمل حاجة صغيرة مهمة ليك، مش عشان حد يشوفها أو يمدحها.","لاحظ الإحساس ده — ده مصدر القيمة اللي مبيتسحبش."]},
  angerout:{name:"تصريف الغضب الصحي",dur:"وقت الحاجة",why:"الغضب المكبوت بيتراكم وبيفضي على الأم. التصريف الصحي بيدّيك مخرج قبل التراكم.",how:["نشاط جسدي (جيم/كورة/مشي سريع) كتصريف منتظم.","لو ولع غضب في لحظة: اكتبه على ورق فوراً بدل ما تكتمه."]},
  beforehome:{name:"بروتوكول قبل البيت",dur:"٥ دقايق",why:"بيقطع حلقة «غضب النهار بيتفضى على الأهل».",how:["قبل ما تدخل البيت وانت شايل غضب، خد ٥ دقايق: مشي سريع أو كتابة.","ادخل وانت فرّغت الشحنة، مش وانت محمّل."]}
};
var M = {
  letter_child:{tag:"write",t:"جواب رحيم للطفل — مشهد الطابور",why:"حداد وإعادة كتابة. الطفل اللي مسك إيد أمه في الطابور محتاج حد كبير يقوله كلمة. إنت الكبير ده دلوقتي.",how:["في «الأدوات ← رسائل للطفل»، اكتب جواب من نفسك دلوقتي للطفل عندك ٨ سنين وهو ماسك إيد أمه.","قوله اللي كان محتاج يسمعه: إن المهمة كانت أكبر منه، وإنه ما كانش ناقص."]},

function toolsView_(){var back='<button class="btn ghost" style="margin-bottom:14px" data-act="toolback">← رجوع للأدوات</button>';
  if(toolsView==="menu"){var items=[["log","سجل الملاحظة","لاحظ المواقف والأحاسيس وعمر الجزء اللي حسّ"],["expect","بطاقات التوقع","اكتب توقعك قبل الموقف، وقارنه بالواقع بعده"],["letters","رسائل للطفل","كلّم الطفل اللي جواك بنبرة رحيمة"],["smiles","رصد الابتسامة","امسك امتى الابتسامة الإجبارية بتقتحم"],["map","خريطة المشهد","كل عرض حالي وأصله القديم"],["safe","بطاقة الأمان","لو مريت بلحظة صعبة"]];
    return '<div class="fade"><div class="card"><div class="eyebrow">الأدوات</div><p class="muted" style="margin:0;font-size:.9rem">المساحة اللي بتسجّل فيها شغلك. كل ما تكتب أكتر، الدليل بيتراكم أكتر.</p></div>'+items.map(function(it){return '<div class="card" data-act="tool:'+it[0]+'" style="cursor:pointer"><h3 style="margin:0 0 3px;font-size:1.02rem;color:var(--gold-soft)">'+it[1]+'</h3><p class="muted" style="margin:0;font-size:.83rem">'+it[2]+'</p></div>';}).join("")+'</div>';}
  if(toolsView==="map")return '<div class="fade">'+back+'<div class="card"><div class="eyebrow">خريطة المشهد القديم ← العرض الحالي</div><p class="muted" style="font-size:.85rem">كل ما عرض من دول يشتغل، سمّيه: «ده مشهد قديم بيتعاد — أنا مش هناك دلوقتي».</p>'+SCENE.map(function(x){return '<div class="mapitem"><div class="now">'+x.now+'</div><div class="arw">←</div><div class="org">'+x.org+'</div></div>';}).join("")+'</div></div>';
  if(toolsView==="safe")return '<div class="fade">'+back+'<div class="card safe"><div class="eyebrow">لو مريت بلحظة صعبة</div><ul style="padding-inline-start:20px;margin:8px 0"><li style="margin-bottom:8px">حطّ إيدك على صدرك، وخد ٥ أنفاس بزفير طويل. اللحظة دي هتعدي.</li><li style="margin-bottom:8px">قول لنفسك: «الإحساس ده عمره سنين، وأنا مش الطفل ده دلوقتي».</li><li style="margin-bottom:8px">كلّم حد تثق فيه — مش لازم تشرح كل حاجة، بس ما تفضلش لوحدك.</li><li style="margin-bottom:8px">لو الضيق تقيل ومستمر، ده وقت المختص مش وقت الملف. طلب المساعدة قوة مش ضعف.</li></ul><hr class="d"/><p class="faint" style="font-size:.8rem;margin:0">التعرّض ممنوع تعمله وانت منفصل تماماً. لو حسيت بانفصال كامل في موقف، اخرج، اهدّي بالتنفس، وارجع درجة أسهل.</p></div></div>';
  if(toolsView==="expect")return expectView(back);
  var cfg={log:{t:"سجل الملاحظة",ph:"إيه اللي حصل؟ جسمك حسّ بإيه؟ الجزء ده عمره كام سنة؟",list:st.log},letters:{t:"رسائل للطفل",ph:"اكتب جواب من نفسك دلوقتي للطفل اللي جواك...",list:st.letters},smiles:{t:"رصد الابتسامة",ph:"امتى الابتسامة اقتحمت؟ مع مين؟ إيه اللي كنت بتحس بيه فعلاً؟",list:st.smiles}}[toolsView];
  var listHtml=cfg.list.length?cfg.list.map(function(e){return '<div class="entry"><div class="d">'+e.d+'</div>'+esc(e.t)+'</div>';}).join(""):'<p class="faint" style="text-align:center;font-size:.85rem">لسه مفيش حاجة مكتوبة. ابدأ دلوقتي.</p>';
  return '<div class="fade">'+back+'<div class="card"><div class="eyebrow">'+cfg.t+'</div><textarea id="jtext" rows="4" placeholder="'+cfg.ph+'"></textarea><button class="btn" style="margin-top:10px" data-act="savejournal:'+toolsView+'">حفظ</button></div>'+listHtml+'</div>';}

function expectView(back){var list=st.expect.map(function(e){return '<div class="entry"><div class="d">'+e.d+' · توقعت '+AR(e.pct)+'٪</div><div><b class="muted">توقعت:</b> '+esc(e.before)+'</div>'+(e.after?'<div style="margin-top:4px"><b style="color:var(--growth)">حصل:</b> '+esc(e.after)+'</div>':'')+'</div>';}).join("");
  var note=st.expect.length>=3?'<div class="card"><p class="muted" style="font-size:.85rem;margin:0">راجع بطاقاتك: كام واحدة من الكوارث اللي خفت منها حصلت فعلاً؟ الفجوة دي هي الدليل الحقيقي إنك كفاية.</p></div>':'';
  return '<div class="fade">'+back+'<div class="card"><div class="eyebrow">بطاقة توقع جديدة</div><label class="fl">قبل الموقف — أتوقع إيه يحصل (الكارثة المحددة)؟</label><textarea id="ex-before" rows="2"></textarea><div class="slider" style="margin-top:12px"><span class="muted" style="font-size:.82rem">احتمالها</span><input type="range" id="ex-pct" min="0" max="100" value="50" data-live="ex-pctv"/><span class="v" id="ex-pctv">٥٠٪</span></div><label class="fl">بعد الموقف — اللي حصل فعلاً</label><textarea id="ex-after" rows="2" placeholder="تقدر تسيبها وترجعلها بعد الموقف"></textarea><button class="btn" style="margin-top:10px" data-act="saveexpect">حفظ البطاقة</button></div>'+list+note+'</div>';}

function progressView(){var c=ctx();var wq=["ابتسامة/استلطاف وقت الغضب","تفريغ غضب على الأهل","بطاقات توقع مكتملة","فتح الرياكتات للمراقبة","مواقف فضلت فيها موجود"];
  var trend=st.weekly.map(function(x){return x.v[4]||0;}),maxT=Math.max.apply(null,[1].concat(trend));
  var h='<div class="fade"><div class="card"><div class="ringrow">'+ring(c.progress)+'<div class="meta"><h3>تقدمك الكلي</h3><p class="muted">'+AR(c.day-1)+' يوم اشتغلت فيهم · '+AR(168-(c.day-1))+' فاضلين</p><p class="faint" style="font-size:.78rem;margin-top:6px">القياس بالأرقام، مش بالإحساس — الإحساس بيتقلب، الأرقام لأ.</p></div></div></div>';
  h+='<div class="card"><div class="eyebrow">قياس أسبوعي (عدّ الأرقام)</div>';
  for(var i=0;i<wq.length;i++)h+='<label class="fl">'+wq[i]+'</label><input type="number" id="wk'+i+'" min="0" value="0"/>';
  h+='<button class="btn" style="margin-top:12px" data-act="saveweekly">سجّل الأسبوع</button></div>';
  if(trend.length)h+='<div class="card"><div class="eyebrow">اتجاه: مواقف فضلت فيها موجود</div><div class="bars">'+trend.map(function(v,i){return '<div class="b"><div class="col" style="height:'+(v/maxT*100)+'%"></div><div class="lb">أ'+AR(i+1)+'</div></div>';}).join("")+'</div><p class="faint" style="font-size:.76rem;margin:8px 0 0;text-align:center">لو العمود بيكبر مع الوقت — ده تعافي حقيقي بيحصل.</p></div>';
  var mrows=[["mo-a","وضوح قراءة مشاعري وجسمي"],["mo-b","قوة الصوت الرحيم مقابل الناقد"],["mo-c","الانتباه للخارج في التوتر"],["mo-d","قيمتي بمعزل عن تفاعل الناس"]];
  h+='<div class="card"><div class="eyebrow">تقييم شهري (٠–١٠)</div>';
  for(var j=0;j<mrows.length;j++)h+='<label class="fl">'+mrows[j][1]+'</label><div class="slider"><input type="range" id="'+mrows[j][0]+'" min="0" max="10" value="5" data-live="'+mrows[j][0]+'v"/><span class="v" id="'+mrows[j][0]+'v">٥</span></div>';
  h+='<button class="btn soft" style="margin-top:8px" data-act="savemonthly">سجّل الشهر</button>'+(st.monthly.length>1?'<p class="muted" style="font-size:.83rem;margin-top:10px">قارن أول شهر بآخر شهر — الفرق ده هو مقياس رحلتك.</p>':'')+'</div>';
  h+='<div class="card"><div class="eyebrow">نسخة احتياطية</div><p class="muted" style="font-size:.83rem;margin:0 0 10px">بياناتك محفوظة على جهازك بس. اعمل نسخة كل فترة عشان ما تخسرش شغلك — ودّيها للمعالج كمان.</p><button class="btn soft" data-act="export">نزّل نسخة من بياناتي</button><label class="btn ghost" style="margin-top:8px;display:block">استرجع نسخة<input type="file" id="importfile" accept="application/json" style="display:none"/></label></div>';
  return h+'</div>';}

/* ================= RENDER ================= */
function render(){
  var view={home:homeView,today:todayView,path:pathView,tools:toolsView_,progress:progressView}[tab]();
  var c=ctx();
  var nav=[["home","⌂","الرئيسية"],["today","◉","مهام اليوم"],["path","⛰","المسار"],["tools","✎","الأدوات"],["progress","◔","التقدم"]].map(function(n){return '<button class="'+(tab===n[0]?'on':'')+'" data-act="tab:'+n[0]+'"><span class="ic">'+n[1]+'</span><span>'+n[2]+'</span></button>';}).join("");
  document.getElementById("app").innerHTML=
    '<div class="wrap"><div class="topbar"><div class="brand">مِشوار<small>رحلة تعافي · خطوة كل يوم</small></div><div class="daychip">يوم '+AR(c.day)+' / ١٦٨</div></div>'+view+'</div><div class="nav">'+nav+'</div>';
  wire();
}
function wire(){
  var live=document.querySelectorAll("[data-live]");
  live.forEach(function(el){el.addEventListener("input",function(){var t=document.getElementById(el.getAttribute("data-live"));if(t)t.textContent=AR(el.value)+(el.id==="ex-pct"?"٪":"");});});
  var imp=document.getElementById("importfile");
  if(imp)imp.addEventListener("change",function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(){try{var d=JSON.parse(r.result);for(var k in d)st[k]=d[k];persist();render();}catch(x){alert("الملف مش صالح");}};r.readAsText(f);});
}
document.getElementById("app").addEventListener("click",function(e){
  var el=e.target.closest("[data-act]");if(!el)return;
  var a=el.getAttribute("data-act"),p=a.indexOf(":"),cmd=p<0?a:a.slice(0,p),arg=p<0?"":a.slice(p+1);
  if(cmd==="tab"){tab=arg;if(tab==="tools")toolsView="menu";window.scrollTo(0,0);render();return;}
  if(cmd==="open"){openTasks[arg]=!openTasks[arg];render();return;}
  if(cmd==="check"){var c=ctx(),dc=st.dayChecks[c.day]||{};dc=Object.assign({},dc);dc[arg]=!dc[arg];var all=Object.assign({},st.dayChecks);all[c.day]=dc;set({dayChecks:all});return;}
  if(cmd==="ms"){var md=Object.assign({},st.msDone);md[arg]=!md[arg];set({msDone:md});return;}
  if(cmd==="finish"){set({day:Math.min(st.day+1,168),qi:st.qi+1});tab="home";window.scrollTo(0,0);render();return;}
  if(cmd==="tool"){toolsView=arg;window.scrollTo(0,0);render();return;}
  if(cmd==="toolback"){toolsView="menu";render();return;}
  if(cmd==="savejournal"){var ta=document.getElementById("jtext"),v=ta?ta.value.trim():"";if(!v)return;var key=arg,arr=(st[key]||[]).slice();arr.unshift({d:new Date().toLocaleDateString("ar-EG"),t:v});var o={};o[key]=arr;set(o);return;}
  if(cmd==="saveexpect"){var b=document.getElementById("ex-before").value.trim();if(!b)return;var pct=+document.getElementById("ex-pct").value,af=document.getElementById("ex-after").value.trim();var arr=st.expect.slice();arr.unshift({d:new Date().toLocaleDateString("ar-EG"),before:b,pct:pct,after:af});set({expect:arr});return;}
  if(cmd==="saveweekly"){var v=[];for(var i=0;i<5;i++)v.push(+document.getElementById("wk"+i).value||0);var arr=st.weekly.slice();arr.push({wk:arr.length+1,v:v});set({weekly:arr});return;}
  if(cmd==="savemonthly"){var mv={a:+document.getElementById("mo-a").value,b:+document.getElementById("mo-b").value,c:+document.getElementById("mo-c").value,d:+document.getElementById("mo-d").value};var arr=st.monthly.slice();arr.push({mo:arr.length+1,v:mv});set({monthly:arr});return;}
  if(cmd==="export"){var blob=new Blob([JSON.stringify(st,null,2)],{type:"application/json"});var url=URL.createObjectURL(blob);var lnk=document.createElement("a");lnk.href=url;lnk.download="mishwar-backup.json";document.body.appendChild(lnk);lnk.click();lnk.remove();return;}
});
render();
</script>
</body>
</html>
